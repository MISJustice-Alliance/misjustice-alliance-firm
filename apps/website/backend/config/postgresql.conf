# PostgreSQL Security & Audit Configuration
# MISJustice Alliance - Hardened Settings

#------------------------------------------------------------------------------
# CONNECTION LOGGING (Audit Trail)
#------------------------------------------------------------------------------

# Log all connection attempts (successful and failed)
log_connections = on
log_disconnections = on

# Log hostname in addition to IP (helps identify attackers)
log_hostname = off  # Keep off for performance, IP is sufficient

#------------------------------------------------------------------------------
# STATEMENT LOGGING
#------------------------------------------------------------------------------

# Log all DDL statements (CREATE, ALTER, DROP)
log_statement = 'ddl'

# Log statements that take longer than 1 second
log_min_duration_statement = 1000

# Log duration of all completed statements
log_duration = off  # Enable if needed for performance analysis

#------------------------------------------------------------------------------
# ERROR LOGGING
#------------------------------------------------------------------------------

# Log all errors, warnings, and notices
log_min_messages = warning
log_min_error_statement = error

# Log checkpoints for performance monitoring
log_checkpoints = on

# Log lock waits longer than 1 second
log_lock_waits = on
deadlock_timeout = '1s'

#------------------------------------------------------------------------------
# LOG FORMAT
#------------------------------------------------------------------------------

# Detailed log line prefix for forensic analysis
# %t = timestamp, %p = PID, %u = user, %d = database, %r = remote host:port, %a = application
log_line_prefix = '%t [%p]: user=%u,db=%d,app=%a,client=%h '

# Log to stderr (captured by Docker)
log_destination = 'stderr'
logging_collector = off  # Docker handles log collection

#------------------------------------------------------------------------------
# SECURITY SETTINGS
#------------------------------------------------------------------------------

# Require password authentication (already default, but explicit)
password_encryption = 'scram-sha-256'

# SSL settings (enable if certificates are configured)
# ssl = on
# ssl_cert_file = '/var/lib/postgresql/server.crt'
# ssl_key_file = '/var/lib/postgresql/server.key'

#------------------------------------------------------------------------------
# NETWORK RESTRICTIONS
#------------------------------------------------------------------------------

# Only listen on internal Docker network (reinforces docker-compose binding)
# Note: This is overridden by docker-compose port mapping
listen_addresses = '*'

# Connection limits
max_connections = 100
superuser_reserved_connections = 3

#------------------------------------------------------------------------------
# RESOURCE LIMITS (Prevent DoS)
#------------------------------------------------------------------------------

# Limit per-connection memory usage
work_mem = '16MB'
maintenance_work_mem = '64MB'

# Statement timeout (prevent long-running malicious queries)
statement_timeout = '60s'

# Idle transaction timeout
idle_in_transaction_session_timeout = '10min'
