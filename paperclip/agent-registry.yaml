# MISJustice Alliance Firm — Agent Registry
# Maps all agents to their Paperclip registration profiles and local policies.
# Each entry corresponds to an agent directory under agents/.
#
# Policy block (used when Paperclip API is unavailable):
#   tier_ceiling   — maximum data tier this agent may access (T0 > T1 > T2 > T3)
#   allowed_tools  — permitted tool names (empty = all allowed unless denied)
#   denied_tools   — explicitly blocked tool names
#   status         — active | inactive | suspended

registry:
  # ---------------------------------------------------------------------------
  # Intake Crew
  # ---------------------------------------------------------------------------
  avery:
    display_name: "Avery — Intake Coordinator"
    role: intake_evidence
    dispatch_priority: high
    adapter_type: openclaw_gateway
    capabilities: "intake and evidence ingestion agent"
    crew: intake
    gateway_endpoint: "${GATEWAY_URL}"
    headers:
      x-openclaw-token: "${AVERY_OPENCLAW_TOKEN}"
    hitl_gates:
      - intake_acceptance
      - tier_classification
    downstream:
      - rae
      - chronology
      - iris
    policy:
      tier_ceiling: T1
      allowed_tiers: [T1, T2, T3]
      allowed_tools:
        - MatterReadTool
        - MatterCreateTool
        - DocumentUploadTool
        - DocumentReadTool
        - OCRPreprocessTool
        - TierClassifyTool
      denied_tools:
        - ExternalTransmitTool
        - VictimImpactTool
        - PublishTool
      status: active

  # ---------------------------------------------------------------------------
  # Research Crew
  # ---------------------------------------------------------------------------
  mira:
    display_name: "Mira — Legal Researcher"
