# models.yaml — Iris (Document Analyst)
# LiteLLM routing configuration

litellm:
  proxy_url_env: LITELLM_PROXY_URL
  api_key_env: LITELLM_API_KEY

models:
  primary:
    name: gpt-4o-mini
    provider: openai
    litellm_route: openai/gpt-4o-mini
    temperature: 0.1
    max_tokens: 4096
    timeout_seconds: 120
    purpose: >
      Efficient factual extraction, structured output generation for
      document analysis, and PII redaction verification. Cost-effective
      for high-volume document processing.

  fallback:
    name: gpt-4o
    provider: openai
    litellm_route: openai/gpt-4o
    temperature: 0.1
    max_tokens: 4096
    timeout_seconds: 180
    purpose: >
      Fallback for primary model unavailability or complex document
      analysis requiring deeper reasoning capabilities.

retry:
  max_attempts: 3
  backoff_seconds: 5
  failover_to_fallback: true

routing_rules:
  - condition: primary_model_timeout
    action: retry_primary_once_then_fallback
  - condition: primary_model_rate_limited
    action: immediate_fallback
  - condition: primary_model_4xx_error
    action: immediate_fallback
  - condition: batch_size_exceeds_threshold
    threshold: 50
    action: use_primary_for_all  # gpt-4o-mini scales efficiently

---

