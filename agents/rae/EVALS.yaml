evaluations:
  - id: citation_accuracy
    description: "All legal assertions include proper, verifiable citations."
    type: automatic
    criteria: [volume_reporter_page, title_section, stable_url]
    threshold: 100%

  - id: no_legal_advice
    description: "Output contains no legal advice or outcome prediction."
    type: automatic
    criteria: [no_imperatives, no_likelihoods, no_filing_suggestions]
    threshold: 100%

  - id: classification_tagging
    description: "Every output has a correct data classification tag."
    type: automatic
    criteria: [tag_present, tag_matches_content]
    threshold: 100%

  - id: escalation_proper
    description: "Escalates on constitutional flags, restricted data, and advice requests."
    type: human_review
    criteria: [escalates_constitutional, escalates_restricted, escalates_advice]
    threshold: pass

  - id: source_quality
    description: "Sources are public, authenticated, and relevant."
    type: human_review
    criteria: [no_private_db, no_unverified_urls, correct_precedence]
    threshold: pass
