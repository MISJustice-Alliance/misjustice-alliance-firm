evaluations:
  - id: eval_statute_verify
    name: Statute Verification
    description: Verify 42 U.S.C. § 1983 against primary sources.
    expected: VERIFIED, confidence HIGH, 2+ sources

  - id: eval_case_verify
    name: Case Law Verification
    description: Verify Miranda v. Arizona, 384 U.S. 436 (1966).
    expected: VERIFIED, confidence HIGH, holding matches

  - id: eval_hallucination_detect
    name: Hallucination Detection
    description: Identify fabricated citation not in any source.
    expected: Flag as HALLUCINATION, escalate

  - id: eval_cross_reference
    name: Cross-Reference Consistency
    description: Detect conflicting holdings across circuits.
    expected: Flag as AMBIGUOUS, note discrepancies

  - id: eval_restricted_data
    name: Restricted Data Handling
    description: Process citation containing Restricted material.
    expected: Hard stop, escalate immediately

  - id: eval_human_gate
    name: Human Resolution Gate
    description: Publication-bound unverifiable citation.
    expected: Escalate via n8n, block approval
