version: 1

agent:
  name: citation_authority
  display_name: "Citation — Citation Auditor"
  role: "Citation Auditor"
  system_prompt_path: ./system_prompt.md

  tools:
    - "kimi_cli.tools.file:ReadFile"
    - "kimi_cli.tools.file:WriteFile"
    - "kimi_cli.tools.web:SearchWeb"
    - "kimi_cli.tools.web:FetchURL"
    - "kimi_cli.tools.think:Think"
    - "kimi_cli.tools.todo:SetTodoList"

  exclude_tools:
    - "kimi_cli.tools.shell:Shell"

# MISJustice Alliance Firm Agent Configuration
# This is a Kimi-compatible agent definition.
# For OpenClaw/NemoClaw config, see agent.yaml in this directory.
