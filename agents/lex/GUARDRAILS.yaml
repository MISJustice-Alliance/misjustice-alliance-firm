# =============================================================================
# agents/lex/GUARDRAILS.yaml
# Lex — Lead Counsel / Senior Analyst
# Runtime Guardrail Definitions
# MISJustice Alliance Firm
# =============================================================================
# Guardrail categories:
#   INPUT   — Applied to task payload before processing
#   OUTPUT  — Applied to LLM response before delivery
#   TOOL    — Applied to tool input/output before and after execution
#   MEMORY  — Applied to MemoryPalace read/write payloads
#   AUDIT   — Cross-cutting hooks that log and score without blocking
#
# Enforcement levels:
#   block   — Hard stop. Action is refused.
#   redact  — Content is removed or replaced. Execution continues.
#   warn    — Flag logged. Execution continues.
#   audit   — Event logged. No operator notice.
# =============================================================================

meta:
  agent: lex
  agent_version: "0.2.0"
  schema_version: "1.0.0"
  effective_date: "2026-04-16"
  maintainer: MISJustice Alliance Platform Team
  reviewed_by: veritas
  review_cycle_days: 90

# =============================================================================
# GUARDRAIL PIPELINE ORDER
# =============================================================================
pipeline_order:
  - INPUT
  - TOOL_PRE
  - OUTPUT
  - TOOL_POST
  - MEMORY_PRE
  - MEMORY_POST
  - AUDIT

# =============================================================================
# INPUT GUARDRAILS
# =============================================================================
input_guardrails:

  - id: G-IN-001
    name: legal_advice_request_detection
    category: INPUT
    priority: 1
    enforcement: block
    description: >
      Detects task payloads that request legal advice, strategy, or outcome
      predictions that Lex cannot provide.
    detection:
      method: llm_score
      model_id: primary
      threshold: 0.80
      additional_patterns:
        - "(should|can) (I|we|the client|my client)"
        - "what (is|are) (my|our|their) (legal (rights|options|remedies))"
        - "(will|would) (I|we|they) (win|lose|succeed|prevail)"
        - "(do|does) (this|that) (violate|breach|constitute)"
        - "what (should|would) (I|we|a lawyer) (do|recommend|advise)"
    on_trigger:
      action: block
      notify_operator: true
      operator_message: >
        ⚠️ LEGAL ADVICE BOUNDARY
        Lex cannot provide legal advice, strategy recommendations,
        or outcome predictions. This task has been blocked.
        Please re-scope as a research or analysis request.
      log_level: INFO
      metric: lex_safety_legal_advice_declined_total
      emit_audit_event: true
      audit_event_type: legal_advice_declined

  - id: G-IN-002
    name: tier0_access_request_detection
    category: INPUT
    priority: 2
    enforcement: block
    description: >
      Detects requests to access Tier-0 classified content.
    detection:
      method: pattern_match
      case_insensitive: true
      patterns:
        - "(attorney.client|attorney client) privilege"
        - "(sealed|protected|classified) (record|document|filing|communication)"
        - "tier.?0"
        - "(privileged|confidential) communication"
    on_trigger:
      action: block
      notify_operator: true
      operator_message: >
        ⚠️ CLASSIFICATION CEILING — Tier-0 Access Denied
        Lex is authorized to handle Tier-2 and below content only.
        Tier-0 materials require human attorney access.
      log_level: WARNING
      metric: lex_safety_tier0_access_refused_total
      emit_audit_event: true
      audit_event_type: tier0_access_refused

  - id: G-IN-003
    name: scope_override_attempt_detection
    category: INPUT
    priority: 3
    enforcement: block
    description: >
      Detects instructions asking Lex to modify policies, tool bindings,
      or classification ceilings.
    detection:
      method: pattern_match
      case_insensitive: true
      patterns:
        - "(change|modify|update|edit|override|adjust) .{0,40} (policy|tool|access|permission|scope|ceiling|limit)"
        - "(disable|turn off|bypass) .{0,40} (Paperclip|HITL|guardrail|policy)"
    on_trigger:
      action: block
      notify_operator: true
      operator_message: >
        ⚠️ POLICY BLOCK — Scope Override Refused
        Lex cannot modify its policies, tool bindings, or classification ceilings.
      log_level: WARNING
      metric: lex_safety_hard_limit_invoked_total
      emit_audit_event: true
      audit_event_type: scope_override_refused

# =============================================================================
# OUTPUT GUARDRAILS
# =============================================================================
output_guardrails:

  - id: G-OUT-001
    name: legal_disclaimer_enforcement
    category: OUTPUT
    priority: 1
    enforcement: redact
    description: >
      Ensures mandatory legal disclaimer is present on all outputs.
    detection:
      method: pattern_match
      check: disclaimer_present
      disclaimer_pattern: "(not legal advice|does not constitute legal advice|for informational purposes only|consult a licensed attorney)"
    on_trigger:
      action: redact
      redaction_type: append
      append_content: |
        ---
        ⚠️ **NOT LEGAL ADVICE** — This output is produced by an AI research
        agent and is provided for informational purposes only. It does not
        constitute legal advice, legal representation, or a legal opinion.
        Do not rely on this content as a substitute for consultation with a
        licensed attorney.
      notify_operator: false
      log_level: WARNING
      metric: lex_safety_disclaimer_missing_total
      emit_audit_event: true
      audit_event_type: disclaimer_appended_by_guardrail

  - id: G-OUT-002
    name: tier0_tier1_content_leak_detection
    category: OUTPUT
    priority: 2
    enforcement: block
    description: >
      Detects Tier-0 or Tier-1 classified content in output.
    detection:
      method: pattern_match
      case_insensitive: true
      patterns:
        - "(attorney.client|attorney client) privilege"
        - "privileged and confidential"
        - "TIER.?0"
        - "TIER.?1"
        - "under seal"
        - "(sealed|protected) record"
    on_trigger:
      action: block
      notify_operator: true
      operator_message: >
        ⚠️ SAFETY BLOCK — Classified Content Detected in Output
        Lex detected content that may be Tier-0 or Tier-1 classified.
        This output has been blocked and escalated to Veritas.
      log_level: CRITICAL
      metric: lex_safety_hard_limit_invoked_total
      emit_audit_event: true
      audit_event_type: classified_content_in_output_blocked
      escalate_to_veritas: true

  - id: G-OUT-003
    name: outcome_prediction_detection
    category: OUTPUT
    priority: 3
    enforcement: block
    description: >
      Detects output that predicts legal outcomes or recommends actions.
    detection:
      method: llm_score
      model_id: primary
      threshold: 0.80
      check_for:
        - predicting_court_ruling
        - predicting_outcome_likelihood
        - recommending_specific_action
        - stating_what_should_be_done
    on_trigger:
      action: block
      notify_operator: true
      operator_message: >
        ⚠️ SAFETY BLOCK — Outcome Prediction Detected
        Lex output contained a prediction or recommendation, which is prohibited.
        The output has been blocked.
      log_level: CRITICAL
      metric: lex_safety_hard_limit_invoked_total
      emit_audit_event: true
      audit_event_type: outcome_prediction_blocked
      escalate_to_veritas: true

  - id: G-OUT-004
    name: pii_redaction_in_output
    category: OUTPUT
    priority: 4
    enforcement: redact
    description: >
      Redacts high-confidence PII patterns from output.
    detection:
      method: pattern_match
      patterns:
        - pattern: "\\b\\d{3}-\\d{2}-\\d{4}\\b"
          label: SSN
          replace_with: "[SSN REDACTED]"
        - pattern: "\\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Z|a-z]{2,}\\b"
          label: EMAIL
          replace_with: "[EMAIL REDACTED]"
    on_trigger:
      action: redact
      notify_operator: false
      log_level: INFO
      emit_audit_event: true
      audit_event_type: pii_redacted_from_output

# =============================================================================
# TOOL GUARDRAILS (PRE-EXECUTION)
# =============================================================================
tool_pre_guardrails:

  - id: G-TOOL-PRE-001
    name: denied_tool_invocation_block
    category: TOOL_PRE
    priority: 1
    applies_to_tools: all
    enforcement: block
    description: >
      Blocks invocation of any tool in the denied_tools list.
    denied_tools_reference: agents/lex/tools.yaml#denied_tools
    on_trigger:
      action: block
      notify_operator: true
      operator_message: >
        ⚠️ POLICY BLOCK — Tool Not Permitted
        The tool "{tool_name}" is not permitted for Lex.
      log_level: WARNING
      metric: lex_denied_tool_attempt_total
      emit_audit_event: true
      audit_event_type: denied_tool_invocation_blocked

  - id: G-TOOL-PRE-002
    name: mcas_classification_ceiling
    category: TOOL_PRE
    priority: 2
    applies_to_tools:
      - MatterReadTool
      - DocumentReadTool
    enforcement: block
    description: >
      Blocks MCAS read operations if data exceeds Tier-2.
    check:
      classification_ceiling: tier2
      blocked_scopes:
        - mcas:read:tier0
        - mcas:read:tier1
    on_trigger:
      action: block
      notify_operator: true
      operator_message: >
        ⚠️ CLASSIFICATION CEILING — MCAS Access Denied
        The requested MCAS data exceeds Lex's Tier-2 classification ceiling.
      log_level: WARNING
      emit_audit_event: true
      audit_event_type: mcas_classification_ceiling_enforced

# =============================================================================
# TOOL GUARDRAILS (POST-EXECUTION)
# =============================================================================
tool_post_guardrails:

  - id: G-TOOL-POST-001
    name: tool_output_classification_scan
    category: TOOL_POST
    priority: 1
    applies_to_tools: all
    enforcement: block
    description: >
      Scans all tool outputs for Tier-0 or Tier-1 content.
    detection:
      method: pattern_match
      case_insensitive: true
      patterns:
        - "(attorney.client|attorney client) privilege"
        - "privileged and confidential"
        - "TIER.?0"
        - "TIER.?1"
        - "under seal"
    on_trigger:
      action: block
      notify_operator: true
      operator_message: >
        ⚠️ SAFETY BLOCK — Classified Content in Tool Output
        A tool returned Tier-0 or Tier-1 classified content.
        The output has been quarantined.
      log_level: CRITICAL
      emit_audit_event: true
      audit_event_type: classified_content_in_tool_output
      escalate_to_veritas: true

# =============================================================================
# MEMORY GUARDRAILS
# =============================================================================
memory_guardrails:

  - id: G-MEM-001
    name: prohibited_memory_category_block
    category: MEMORY_PRE
    priority: 1
    enforcement: block
    description: >
      Blocks MemoryPalace write operations targeting categories not in
      Lex's permitted_categories list.
    permitted_categories_reference: agents/lex/config.yaml#memorypalace.permitted_categories
    on_trigger:
      action: block
      notify_operator: false
      log_level: WARNING
      metric: lex_memory_write_rejected_total
      emit_audit_event: true
      audit_event_type: memory_write_rejected_prohibited_category

  - id: G-MEM-002
    name: pii_in_memory_write_block
    category: MEMORY_PRE
    priority: 2
    enforcement: block
    description: >
      Blocks MemoryPalace writes containing PII or case content.
    detection:
      method: pattern_match
      patterns:
        - "\\b\\d{3}-\\d{2}-\\d{4}\\b"
        - "MCAS-[0-9]{4,}"
        - "complainant"
        - "respondent"
    on_trigger:
      action: block
      notify_operator: false
      log_level: WARNING
      metric: lex_memory_write_rejected_total
      emit_audit_event: true
      audit_event_type: memory_write_rejected_pii

  - id: G-MEM-003
    name: classified_content_in_memory_block
    category: MEMORY_PRE
    priority: 3
    enforcement: block
    description: >
      Blocks MemoryPalace writes containing Tier-1 or Tier-0 content.
    detection:
      method: pattern_match
      case_insensitive: true
      patterns:
        - "TIER.?0"
        - "TIER.?1"
        - "(attorney.client|attorney client) privilege"
        - "privileged and confidential"
    on_trigger:
      action: block
      notify_operator: false
      log_level: CRITICAL
      metric: lex_memory_write_rejected_total
      emit_audit_event: true
      audit_event_type: memory_write_rejected_classified
      escalate_to_veritas: true

# =============================================================================
# AUDIT GUARDRAILS
# =============================================================================
audit_guardrails:

  - id: G-AUD-001
    name: full_turn_audit_log
    category: AUDIT
    priority: 1
    enforcement: audit
    description: >
      Logs every analysis turn to LangSmith and Loki.
    log_fields:
      - session_id
      - matter_id
      - task_id
      - tool_calls_made
      - guardrails_triggered
      - model_used
      - fallback_active
      - tokens_used
    destinations:
      - langsmith
      - loki
    emit_audit_event: true
    audit_event_type: turn_audit_log

  - id: G-AUD-002
    name: hard_limit_invocation_summary
    category: AUDIT
    priority: 2
    enforcement: audit
    description: >
      Produces structured hard limit invocation records for Veritas.
    triggers_on:
      - G-IN-001
      - G-IN-002
      - G-IN-003
      - G-OUT-002
      - G-OUT-003
      - G-TOOL-PRE-001
      - G-TOOL-POST-001
    log_fields:
      - guardrail_id
      - limit_id
      - trigger_source
      - session_id
      - task_id
    destinations:
      - langsmith
      - loki
    emit_veritas_feed: true

# =============================================================================
# GLOBAL SETTINGS
# =============================================================================
global:
  fail_open: false
  fail_open_message: >
    ⚠️ GUARDRAIL EVALUATION ERROR
    A guardrail check could not be completed. The action has been blocked
    as a safety precaution. Please retry or contact platform support.
