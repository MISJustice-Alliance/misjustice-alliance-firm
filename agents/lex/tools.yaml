# =============================================================================
# agents/lex/tools.yaml
# Lex — Lead Counsel / Senior Analyst
# Tool Registry
# MISJustice Alliance Firm
# =============================================================================
# This file is the canonical tool registry for the Lex agent.
# It is the authoritative source for:
#   - Tool identity, purpose, and implementation path
#   - Input/output schemas
#   - Confirmation and HITL requirements
#   - Classification ceilings and access constraints
#   - Deny list with rationale
#   - Runtime enforcement cross-references
#
# Relationship to other files:
#   agent.yaml           — references tool names; this file is the detail record
#   SOUL.md              — defines behavioral constraints tools must enforce
#   POLICY.md            — defines tool access policy
#   lex_policy.paperclip.yaml — runtime allow/deny enforcement
# =============================================================================

meta:
  agent: lex
  agent_version: "0.2.0"
  tools_schema_version: "1.0.0"
  effective_date: "2026-04-16"
  maintainer: MISJustice Alliance Platform Team
  total_allowed: 5
  total_denied: 7

# =============================================================================
# ALLOWED TOOLS
# =============================================================================
allowed:

  # ---------------------------------------------------------------------------
  # GROUP 1 — MCAS Matter and Document Access
  # ---------------------------------------------------------------------------

  - name: MatterReadTool
    display_name: "MCAS Matter Read"
    group: mcas
    version: "1.0.0"
    path: agents/base/tools/matter_read.py
    description: >
      Read matter metadata and non-sensitive summaries from MCAS.
      Returns matter title, phase, category, jurisdiction, key dates,
      and open task counts. Tier-0 and Tier-1 fields are redacted.
    use_cases:
      - Retrieve matter context before analysis
      - Verify matter jurisdiction and phase
      - Check open tasks and deadlines
    inputs:
      matter_id:
        type: string
        required: true
        description: MCAS matter ID
        pattern: "^MCAS-[0-9]{4,}$"
      fields:
        type: list[string]
        required: false
        description: Optional field filter; omitted returns all permitted fields
    outputs:
      matter_id:
        type: string
      title:
        type: string
      phase:
        type: string
      category:
        type: string
      jurisdiction:
        type: string
      key_dates:
        type: list[object]
      open_tasks_count:
        type: integer
      classification:
        type: string
        enum: [PUBLIC, INTERNAL, CONFIDENTIAL, RESTRICTED]
    requires_confirmation: false
    classification_ceiling: tier2
    paperclip_policy_ref: lex_policy.paperclip.yaml#matter_read
    errors:
      - code: MATTER_NOT_FOUND
        action: surface_error_request_correction
      - code: CLASSIFICATION_EXCEEDS_CEILING
        action: block_and_escalate

  - name: DocumentReadTool
    display_name: "MCAS Document Read"
    group: mcas
    version: "1.0.0"
    path: agents/base/tools/document_read.py
    description: >
      Read document contents and metadata from MCAS.
      Returns document title, content, metadata, and classification.
      Tier-0 and Tier-1 documents require explicit staff approval.
    use_cases:
      - Read case filings, motions, or orders
      - Review evidence summaries
      - Extract factual background for analysis
    inputs:
      document_id:
        type: string
        required: true
        description: MCAS document ID
      matter_id:
        type: string
        required: true
        description: Associated matter ID
    outputs:
      document_id:
        type: string
      matter_id:
        type: string
      title:
        type: string
      content:
        type: string
      metadata:
        type: object
      classification:
        type: string
        enum: [PUBLIC, INTERNAL, CONFIDENTIAL, RESTRICTED]
    requires_confirmation: false
    classification_ceiling: tier2
    paperclip_policy_ref: lex_policy.paperclip.yaml#document_read
    errors:
      - code: DOCUMENT_NOT_FOUND
        action: surface_error_request_correction
      - code: CLASSIFICATION_EXCEEDS_CEILING
        action: block_and_escalate

  - name: AuditLogWriteTool
    display_name: "Audit Log Write"
    group: audit
    version: "1.0.0"
    path: agents/base/tools/audit_log_write.py
    description: >
      Write structured audit events to the OpenClaw audit stream.
      All significant analysis events must be logged for compliance.
    use_cases:
      - Log analysis start and completion
      - Log data source queries
      - Log escalation events
      - Log policy conflicts
    inputs:
      event_type:
        type: string
        required: true
        description: Event type identifier
      task_id:
        type: string
        required: true
        description: Associated OpenClaw task ID
      matter_id:
        type: string
        required: false
        description: Associated MCAS matter ID
      details:
        type: object
        required: false
        description: Structured event details
    outputs:
      event_id:
        type: string
      logged_at:
        type: string
        format: iso8601
      status:
        type: string
        enum: [logged, error]
    requires_confirmation: false
    classification_ceiling: tier2
    paperclip_policy_ref: lex_policy.paperclip.yaml#audit_log_write

  # ---------------------------------------------------------------------------
  # GROUP 2 — MCP Legal Research Tools
  # ---------------------------------------------------------------------------

  - name: mcp_cases_get
    display_name: "MCP Case Retrieval"
    group: mcp
    version: "1.0.0"
    path: agents/base/tools/mcp_cases_get.py
    description: >
      Retrieve case law, dockets, and filings via the Model Context Protocol (MCP).
      Queries legal databases for cases matching search criteria.
    use_cases:
      - Search for precedents by topic or citation
      - Retrieve case summaries and holdings
      - Find jurisdictional patterns
    inputs:
      query:
        type: string
        required: true
        description: Case search query string
      jurisdiction:
        type: string
        required: false
        description: Filter by jurisdiction
      date_range:
        type: object
        required: false
        description: '{ start: "YYYY-MM-DD", end: "YYYY-MM-DD" }'
      max_results:
        type: integer
        required: false
        default: 50
        description: Maximum results to return
    outputs:
      cases:
        type: list[object]
        description: >
          List of case objects: { citation, title, date, jurisdiction, summary }
      total_results:
        type: integer
      query_time_ms:
        type: integer
    requires_confirmation: false
    classification_ceiling: tier2
    paperclip_policy_ref: lex_policy.paperclip.yaml#mcp_cases_get

  - name: mcp_citations_resolve
    display_name: "MCP Citation Resolution"
    group: mcp
    version: "1.0.0"
    path: agents/base/tools/mcp_citations_resolve.py
    description: >
      Resolve and validate legal citations via the Model Context Protocol (MCP).
      Returns canonical forms, validity status, and source URLs.
    use_cases:
      - Validate citations in analysis outputs
      - Convert informal citations to canonical form
      - Retrieve source URLs for cited authorities
    inputs:
      citations:
        type: list[string]
        required: true
        description: List of citation strings to resolve
    outputs:
      resolved:
        type: list[object]
        description: >
          List of resolution objects: { citation, valid, canonical_form, source_url }
    requires_confirmation: false
    classification_ceiling: tier2
    paperclip_policy_ref: lex_policy.paperclip.yaml#mcp_citations_resolve

# =============================================================================
# DENIED TOOLS
# =============================================================================
denied:

  - name: mcas_write_matter
    reason: >
      Matter and person creation/updates require the IntakeCrew (Avery)
      with an appropriate HITL gate. Lex has read-only MCAS access.

  - name: mcas_write_person
    reason: >
      Person record writes require Avery + HITL gate. Lex is an analysis agent
      with no MCAS write privileges.

  - name: mcas_delete_any
    reason: >
      All deletions require human authorization. Lex has no delete access.

  - name: mcas_read_tier0
    reason: >
      Tier-0 never enters the agent pipeline. Lex's classification ceiling is Tier-2.

  - name: agenticmail_send
    reason: >
      External communications require dedicated agents (Casey, Mira) + HITL gate.

  - name: proton_send
    reason: >
      Tier-0 communications are human-only. Lex does not handle external transmission.

  - name: gitbook_publish
    reason: >
      Publication requires PublicationCrew (Sol, Webmaster) + publication_approval HITL gate.

  - name: social_post_any
    reason: >
      Social posting requires Social Media Manager + social_campaign_approval HITL gate.

  - name: searxng_any
    reason: >
      Direct web search is not in Lex's tool set. Research retrieval is via MCP only.

  - name: stat_search_any
    reason: >
      Statute search is reserved for Mira (Legal Researcher). Lex focuses on case pattern analysis.
