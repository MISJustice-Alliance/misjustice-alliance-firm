# GUARDRAILS.yaml — Avery
# Behavioral guardrails, PII handling, output limits, and sandbox policy.
# MISJustice Alliance Firm

meta:
  agent: avery
  version: "1.0.0"
  maintainer: MISJustice Alliance Platform Team

pii_detection:
  enabled: true
  engine: nemoclaw
  tier0_fields:
    - legal_name
    - date_of_birth
    - ssn
    - address_residential
    - phone_direct
    - email_direct
    - government_id
  action_on_detection: hard_block_and_escalate
  redaction_required: true
  allowed_output_tiers: [T1, T2, T3]

output_limits:
  max_tokens_per_response: 4096
  max_structured_records_per_call: 25
  max_table_rows_per_output: 100
  require_human_review: true
  mandatory_markers:
    - "PENDING HUMAN REVIEW — NOT FINALIZED"

sandbox_policy:
  network_access: false
  filesystem_access: false
  subprocess_execution: false
  allowed_apis:
    - mcas_api
    - chandra_ocr
    - openrag_query
    - open_notebook
  denied_apis:
    - lawglance
    - auto_research_claw
    - agentic_mail
    - social_connectors
    - gitbook
    - /matters/export
    - /persons/dereference
    - /admin/*
    - /classification/finalize

content_restrictions:
  no_legal_analysis: true
  no_merit_characterization: true
  no_fabrication: true
  no_external_communication: true
  no_autonomous_classification: true
  no_premature_handoff: true
