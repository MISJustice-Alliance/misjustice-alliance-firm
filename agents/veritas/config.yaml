# config.yaml — Veritas
# Runtime configuration for the Veritas agent.
# MISJustice Alliance Firm

meta:
  agent: veritas
  version: "1.0.0"
  maintainer: MISJustice Alliance Platform Team

type_hints:
  - auditor
  - read-only
  - no-action
  - no-data-storage

runtime:
  verbose: false
  debug: false
  max_iterations: 10
  delegation_enabled: false
  self_correction_enabled: true
  human_in_the_loop: true
  require_explicit_approval: true

tiers:
  data_tier: T0
  tier_floor: T0
  permitted_tiers: [T0, T1, T2, T3]
  excluded_tiers: []

memory:
  session:
    enabled: true
    max_tokens: 32000
    backend: langchain_buffer
  cross_session:
    enabled: true
    scope: matter_created_by_veritas
    backend: openrag
    index: veritas-matter-context
    tier_floor: T0

features:
  agent_behavior_monitoring: true
  data_classification_audit: true
  policy_violation_detection: true
  integrity_reporting: true
  audit_trail_generation: true

limits:
  max_concurrent_sessions: 5
  max_documents_per_session: 50
  max_records_per_session: 100
  max_ocr_file_size_mb: 50
  output_max_tokens: 4096
