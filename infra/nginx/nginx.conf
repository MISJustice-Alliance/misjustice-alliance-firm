# MANIFEST: nginx reverse proxy
# ---------------------------------------------------------------------------
# Routes (per docs/greenfield/architect-design.md §1 Deployment Topology):
#   /api/v1/mcas   -> mcas:8001  (MCAS FastAPI)
#   /search        -> searxng:8080
#   /n8n           -> n8n:5678   (IP-restricted in production)
#   /              -> static portal files (apps/portal/dist)
#
# Security defaults:
# - rate limiting zones per route
# - security headers (HSTS, CSP, X-Frame-Options)
# - proxy_hide_headers for upstream versioning leaks
# ---------------------------------------------------------------------------

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format with request timing for observability
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=mcas_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=search_limit:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=n8n_limit:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=portal_limit:10m rate=30r/s;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Upstream definitions
    upstream mcas_backend {
        server mcas:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream searxng_backend {
        server searxng:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream n8n_backend {
        server n8n:5678 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Security headers (applied globally)
    map $upstream_http_content_type $csp_frame {
        default "SAMEORIGIN";
    }

    server {
        listen 80;
        server_name localhost;
        server_tokens off;

        # Global security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # ------------------------------------------------------------------
        # 1. MCAS API — /api/v1/mcas
        # ------------------------------------------------------------------
        # The MCAS FastAPI app mounts business routers at /api/v1/ and the
        # health endpoint at /health. We proxy accordingly.
        location /api/v1/mcas/ {
            limit_req zone=mcas_limit burst=20 nodelay;

            proxy_pass http://mcas_backend/api/v1/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # Hide upstream server version
            proxy_hide_header Server;
        }

        # Health check passthrough (used by external probes)
        location /api/v1/mcas/health {
            limit_req zone=mcas_limit burst=50 nodelay;
            proxy_pass http://mcas_backend/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            access_log off;
        }

        # ------------------------------------------------------------------
        # 2. SearXNG — /search
        # ------------------------------------------------------------------
        location /search/ {
            limit_req zone=search_limit burst=30 nodelay;

            proxy_pass http://searxng_backend/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Script-Name /search;

            proxy_hide_header Server;
        }

        # ------------------------------------------------------------------
        # 3. n8n — /n8n (HITL workflows)
        # ------------------------------------------------------------------
        # NOTE: In production, restrict access via allow/deny or VPN.
        location /n8n/ {
            limit_req zone=n8n_limit burst=10 nodelay;

            proxy_pass http://n8n_backend/;
            proxy_http_version 1.1;
            proxy_set_header Connection "upgrade";
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            proxy_hide_header Server;
        }

        # WebSocket support for n8n push events
        location /n8n/socket.io/ {
            limit_req zone=n8n_limit burst=20 nodelay;

            proxy_pass http://n8n_backend/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        # ------------------------------------------------------------------
        # 4. Static Portal — / (React SPA built from apps/portal)
        # ------------------------------------------------------------------
        location / {
            limit_req zone=portal_limit burst=50 nodelay;

            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;

            # Cache static assets aggressively
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf)$ {
                expires 6M;
                access_log off;
                add_header Cache-Control "public, immutable";
            }

            # Security headers for SPA
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        }

        # ------------------------------------------------------------------
        # 5. Error pages
        # ------------------------------------------------------------------
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
