# MODULE: litellm-proxy
# LiteLLM configuration for local development.
# In production, this file is generated from Vault / Bitwarden SM.
#
# Policies:
# - Tier-1 (PRIVILEGED) matters MUST use local LLMs only.
# - Tier-2+ may use cloud providers with logging disabled.
# - Model fallback is enabled for resilience.
# -----------------------------------------------------------------------------

model_list:
  # Local model (ollama / vllm / llama.cpp)
  - model_name: local-llm
    litellm_params:
      model: ollama/llama3.2
      api_base: http://host.docker.internal:11434
      timeout: 120
    model_info:
      tier_allowed: [T0, T1, T2, T3]

  # Cloud fallback (example — requires real API key in production)
  # - model_name: cloud-gpt-fallback
  #   litellm_params:
  #     model: openai/gpt-4o-mini
  #     api_key: os.environ/OPENAI_API_KEY
  #     timeout: 60
  #   model_info:
  #     tier_allowed: [T0, T2, T3]

  # Embeddings (local)
  - model_name: local-embeddings
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://host.docker.internal:11434
      timeout: 60
    model_info:
      tier_allowed: [T0, T1, T2, T3]

# General settings
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true
  proxy_batch_write_at: 60

# Rate limits
router_settings:
  timeout: 120
  routing_strategy: simple-shuffle
  model_group_alias:
    default: local-llm

# LiteLLM Proxy callbacks / guardrails (future)
# callbacks: []
